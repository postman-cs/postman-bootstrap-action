// Telecom-flavored gRPC contract fixture for postman-actions onboarding e2e.
// Exercises every stream kind (unary, server, client, bidi), enums, repeated,
// map, nested messages, 64-bit ints, a proto3 explicit optional field, plus
// well-known types (Timestamp/Duration/FieldMask/StringValue/BytesValue), bytes,
// a multi-member oneof, and a map whose value is a message, so the parser/builder/instrumenter golden
// output covers the full surface. Well-known types are referenced without an
// import: a standalone protobufjs parse never resolves them, and the parser
// classifies them by raw proto type name.
syntax = "proto3";

package telecom.network.v1;

// SignalQuality is an enum to verify enum-name membership assertions.
enum SignalQuality {
  SIGNAL_QUALITY_UNSPECIFIED = 0;
  SIGNAL_QUALITY_POOR = 1;
  SIGNAL_QUALITY_FAIR = 2;
  SIGNAL_QUALITY_GOOD = 3;
  SIGNAL_QUALITY_EXCELLENT = 4;
}

message GeoPoint {
  double latitude = 1;
  double longitude = 2;
}

message Tower {
  string tower_id = 1;
  GeoPoint location = 2;
  SignalQuality quality = 3;
  // repeated scalar -> array assertion.
  repeated string supported_bands = 4;
  // 64-bit int -> JSON string assertion.
  int64 subscriber_count = 5;
  // proto3 explicit optional -> presence NOT asserted.
  optional string operator_label = 6;
  // map -> object assertion.
  map<string, string> attributes = 7;
}

message GetTowerRequest {
  string tower_id = 1;
}

message ListTowersRequest {
  GeoPoint center = 1;
  double radius_km = 2;
}

message UplinkSample {
  string tower_id = 1;
  double signal_dbm = 2;
}

message UplinkSummary {
  int64 sample_count = 1;
  double average_dbm = 2;
}

message DiagnosticPing {
  string tower_id = 1;
}

message DiagnosticPong {
  string tower_id = 1;
  bool reachable = 2;
}

message GetNetworkEventRequest {
  string event_id = 1;
}

// NetworkEvent exercises well-known-type JSON encodings, a multi-member oneof
// (mutual exclusion), a map whose value is a message, and nested recursion
// (tower -> location -> GeoPoint).
message NetworkEvent {
  string event_id = 1;
  // WKT scalar encodings: Timestamp/Duration -> JSON string.
  google.protobuf.Timestamp occurred_at = 2;
  google.protobuf.Duration ttl = 3;
  // WKT wrapper: nullable JSON string (present-but-null is legal).
  google.protobuf.StringValue note = 4;
  // multi-member oneof: at most one member may be set.
  oneof detail {
    Tower tower = 5;
    DiagnosticPong pong = 6;
  }
  // map whose value is a message -> nested value shape assertion.
  map<string, GeoPoint> waypoints = 7;
  // WKT/scalar lexical encodings: FieldMask and bytes are ProtoJSON strings
  // with format validation, including nullable BytesValue.
  google.protobuf.FieldMask mask = 8;
  bytes payload = 9;
  google.protobuf.BytesValue wrapped_payload = 10;
}

service TowerService {
  // unary
  rpc GetTower(GetTowerRequest) returns (Tower);
  // server streaming
  rpc ListTowers(ListTowersRequest) returns (stream Tower);
  // client streaming
  rpc RecordUplink(stream UplinkSample) returns (UplinkSummary);
  // bidirectional streaming
  rpc Diagnose(stream DiagnosticPing) returns (stream DiagnosticPong);
  // unary returning a message with well-known types, a oneof, and a message map
  rpc GetNetworkEvent(GetNetworkEventRequest) returns (NetworkEvent);
}
