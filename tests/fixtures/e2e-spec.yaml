openapi: "3.0.3"
info:
  title: E2E Test API
  version: "1.0.0"
  description: |
    Minimal OpenAPI spec used for E2E testing the postman-bootstrap-action.

    ## Service Level Agreement
    This API targets 99.9% uptime with a p99 response time under 500ms.
  contact:
    name: Postman
    email: support@postman.com
servers:
  - url: https://api.example.com/v1
    description: Production
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      tags:
        - Pets
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a pet
      operationId: createPet
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pets/{petId}:
    get:
      summary: Get a pet by ID
      operationId: getPet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a pet
      operationId: deletePet
      tags:
        - Pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
      responses:
        "204":
          description: Pet deleted
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /owners:
    get:
      summary: List all owners
      operationId: listOwners
      tags:
        - Owners
      responses:
        "200":
          description: A list of owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Owner"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /owners/{ownerId}:
    get:
      summary: Get an owner by ID
      operationId: getOwner
      tags:
        - Owners
      parameters:
        - name: ownerId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
      responses:
        "200":
          description: A single owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Owner"
        "404":
          description: Owner not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    ResourceId:
      type: string
      description: Unique resource identifier.
    ResourceName:
      type: string
      description: Human-readable resource name.
    ResourceTag:
      type: string
      description: Optional classification tag.
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        name:
          $ref: "#/components/schemas/ResourceName"
        tag:
          $ref: "#/components/schemas/ResourceTag"
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
        tag:
          $ref: "#/components/schemas/ResourceTag"
    Owner:
      type: object
      required:
        - id
        - name
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        name:
          $ref: "#/components/schemas/ResourceName"
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
